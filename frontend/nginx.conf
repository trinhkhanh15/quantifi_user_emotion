server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Dòng quan trọng nhất ở đây
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình lỗi (tùy chọn)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}